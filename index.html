<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidaka Stream | Xiao ye Masterpiece</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

        :root {
            --bg-color: #0b0510;
            --surface-color: rgba(26, 11, 46, 0.6);
            --primary-accent: #9333ea;
            --primary-glow: rgba(147, 51, 234, 0.5);
            --text-main: #f3e8ff;
            --text-muted: #c084fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: radial-gradient(circle at top, #2b1055 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header & Nav --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 5, 16, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(147, 51, 234, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px var(--primary-glow);
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        /* --- Main Content --- */
        main {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        h2.section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            border-left: 5px solid var(--primary-accent);
            padding-left: 15px;
            animation: slideIn 0.5s ease-out;
        }

        /* --- Grid & Cards --- */
        .donghua-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--surface-color);
            border: 1px solid rgba(147, 51, 234, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s forwards;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 25px var(--primary-glow);
            border-color: var(--primary-accent);
        }

        .card-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img {
            transform: scale(1.1);
        }

        .img-container {
            overflow: hidden;
            position: relative;
        }

        .episode-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary-accent);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 2;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .card-info {
            padding: 15px;
            background: linear-gradient(to top, var(--surface-color) 0%, transparent 100%);
            position: absolute;
            bottom: 0;
            width: 100%;
            backdrop-filter: blur(5px);
        }

        .card-title {
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* --- Loading State --- */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50vh;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(147, 51, 234, 0.2);
            border-top-color: var(--primary-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* --- Animations --- */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes slideIn { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <header>
        <div class="logo">HIDAKA STREAM</div>
    </header>

    <main>
        <h2 class="section-title">Episode Terbaru</h2>
        <div id="loader" class="loader"><div class="spinner"></div></div>
        <div id="grid" class="donghua-grid"></div>
    </main>

    <script>
        // Xiao ye's Script - Jangan dirusak.
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('grid');
            const loader = document.getElementById('loader');

            try {
                // Di Vercel, API endpoint ada di /api/donghub?command=home
                const response = await fetch('/api/donghub?command=home');
                const data = await response.json();

                loader.style.display = 'none';

                if(data.latest_episodes && data.latest_episodes.length > 0) {
                    data.latest_episodes.forEach((anime, index) => {
                        const delay = index * 0.1; // Staggered animation
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.style.animationDelay = `${delay}s`;
                        
                        card.innerHTML = `
                            <div class="img-container">
                                <span class="episode-badge">${anime.episode || '?'}</span>
                                <img src="${anime.thumbnail}" alt="${anime.title}" class="card-img" loading="lazy">
                                <div class="card-info">
                                    <h3 class="card-title">${anime.title}</h3>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = '<p>Nggak ada data, cek API lu yang bener.</p>';
                }

            } catch (err) {
                loader.style.display = 'none';
                grid.innerHTML = `<p style="color: red;">Error: ${err.message}. Gitu aja nggak becus.</p>`;
            }
        });
    </script>
</body>
</html>
