<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Abras AI · Multi Model Chat</title>
<style>
  :root{
    --bg:#0b0c0f;
    --surface:#13151a;
    --surface2:#191b22;
    --border:#23262f;
    --border-soft:#1b1d24;
    --accent:#ff5a36;
    --accent-soft:#ffb199;
    --accent-dim:rgba(255,90,54,.14);
    --text:#eef0f3;
    --text-dim:#9298a5;
    --text-faint:#5d6271;
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
    --ease:cubic-bezier(.22,1,.36,1);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s !important; transition-duration:.001s !important;}
  }

  /* ===== APP SHELL ===== */
  .app{
    display:flex;
    height:100vh;
    width:100vw;
    position:relative;
  }

  /* ===== SIDEBAR ===== */
  .sidebar{
    width:280px;
    flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--border-soft);
    display:flex;
    flex-direction:column;
    transform:translateX(-100%);
    transition:transform .42s var(--ease);
    position:fixed;
    top:0; left:0; bottom:0;
    z-index:50;
  }
  .sidebar.open{transform:translateX(0);}

  .sidebar-head{
    display:flex;
    align-items:center;
    gap:10px;
    padding:18px 16px 14px;
  }
  .brand-mark{
    width:34px;height:34px;
    border-radius:10px;
    background:linear-gradient(135deg,var(--accent),#c93f1f);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:.95rem;
    color:#0b0c0f;
    flex-shrink:0;
  }
  .brand-name{
    font-weight:800;
    font-size:1.05rem;
    letter-spacing:.5px;
  }
  .sidebar-close{
    margin-left:auto;
    width:30px;height:30px;
    border-radius:8px;
    background:transparent;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:1rem;
  }
  .sidebar-close:hover{background:var(--surface2); color:var(--text);}

  .sidebar-actions{
    display:flex;
    gap:8px;
    padding:0 16px 14px;
  }
  .sb-btn{
    flex:1;
    display:flex;align-items:center;justify-content:center;
    gap:6px;
    padding:10px 12px;
    border-radius:var(--radius-sm);
    background:var(--surface2);
    border:1px solid var(--border-soft);
    color:var(--text);
    font-size:.82rem;
    font-weight:600;
    cursor:pointer;
    transition:border-color .2s, background .2s;
  }
  .sb-btn:hover{border-color:var(--accent); background:#1d1f27;}
  .sb-btn.icon-only{flex:0 0 40px; padding:10px;}

  .sidebar-divider{
    height:1px;
    background:var(--border-soft);
    margin:4px 16px 10px;
  }

  .history-label{
    font-size:.66rem;
    letter-spacing:1.5px;
    color:var(--text-faint);
    padding:0 16px 8px;
    font-weight:700;
  }

  .history-list{
    flex:1;
    overflow-y:auto;
    padding:0 10px;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .history-item{
    display:flex;
    align-items:center;
    gap:9px;
    padding:9px 10px;
    border-radius:var(--radius-sm);
    color:var(--text-dim);
    font-size:.83rem;
    cursor:pointer;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    transition:background .15s;
  }
  .history-item:hover{background:var(--surface2); color:var(--text);}
  .history-item svg{flex-shrink:0; opacity:.6;}

  .sidebar-foot{
    padding:14px 16px 18px;
    border-top:1px solid var(--border-soft);
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .core-pill{
    display:flex;align-items:center;gap:8px;
    padding:9px 12px;
    border-radius:var(--radius-sm);
    background:var(--surface2);
    font-size:.78rem;
    color:var(--text-dim);
  }
  .core-pill .live-dot{
    width:6px;height:6px;border-radius:50%;
    background:#3ddc84;
    animation:livepulse 2.4s infinite;
  }
  .foot-links{display:flex; gap:8px;}
  .foot-links a{
    flex:1;
    text-align:center;
    padding:8px;
    border-radius:var(--radius-sm);
    background:var(--surface2);
    color:var(--text-dim);
    font-size:.74rem;
    text-decoration:none;
    font-weight:600;
    transition:color .2s, background .2s;
  }
  .foot-links a:hover{color:var(--text); background:#1d1f27;}
  .credit{
    text-align:center;
    font-size:.66rem;
    color:var(--text-faint);
    letter-spacing:.3px;
  }
  .credit b{color:var(--text-dim);}

  .sidebar-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,.5);
    z-index:40;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s var(--ease);
  }
  .sidebar-overlay.show{opacity:1; pointer-events:auto;}

  /* ===== MAIN ===== */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
    min-width:0;
  }

  /* TOP BAR */
  .topbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 14px;
    border-bottom:1px solid var(--border-soft);
    flex-shrink:0;
  }
  .icon-btn{
    width:38px;height:38px;
    border-radius:var(--radius-sm);
    background:var(--surface);
    border:1px solid var(--border-soft);
    color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:border-color .2s, color .2s;
  }
  .icon-btn:hover{border-color:var(--accent); color:var(--text);}
  .icon-btn.active{
    background:var(--accent-dim);
    border-color:var(--accent);
    color:var(--accent-soft);
  }

  /* MODEL SELECTOR */
  .model-selector-wrapper{position:relative; flex:1; max-width:240px;}
  .model-trigger{
    display:flex;align-items:center;gap:8px;
    padding:9px 12px;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:border-color .2s;
    user-select:none;
  }
  .model-trigger:hover, .model-trigger.open{border-color:var(--accent);}
  .model-trigger .selected-icon{font-size:1.05rem; flex-shrink:0;}
  .model-trigger .selected-info{flex:1; min-width:0; display:flex; flex-direction:column;}
  .model-trigger .selected-name{
    font-weight:700; font-size:.82rem;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .model-trigger .selected-provider{
    font-size:.62rem; color:var(--text-faint);
    text-transform:capitalize;
  }
  .model-trigger .chevron{
    color:var(--text-faint);
    font-size:.65rem;
    transition:transform .25s var(--ease);
    flex-shrink:0;
  }
  .model-trigger.open .chevron{transform:rotate(180deg);}

  .model-dropdown{
    position:absolute;
    top:calc(100% + 8px);
    left:0;
    width:320px;
    max-width:calc(100vw - 28px);
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    z-index:100;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.55);
    opacity:0;
    transform:translateY(-6px) scale(.98);
    pointer-events:none;
    transition:opacity .22s var(--ease), transform .22s var(--ease);
  }
  .model-dropdown.show{
    opacity:1;
    transform:translateY(0) scale(1);
    pointer-events:auto;
  }

  .dropdown-header{
    display:flex;gap:6px;
    padding:12px 12px 0;
  }
  .tab-btn{
    padding:7px 13px;
    border-radius:20px;
    border:1px solid transparent;
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    font-size:.74rem;
    font-weight:600;
    transition:all .2s;
    white-space:nowrap;
  }
  .tab-btn.active{
    background:var(--accent-dim);
    border-color:var(--accent);
    color:var(--accent-soft);
  }
  .tab-btn:hover:not(.active){color:var(--text); background:var(--surface);}

  .search-box{
    width:calc(100% - 24px);
    margin:10px 12px 4px;
    padding:9px 12px;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:var(--radius-sm);
    color:var(--text);
    font-size:.82rem;
    outline:none;
    transition:border-color .2s;
  }
  .search-box:focus{border-color:var(--accent);}
  .search-box::placeholder{color:var(--text-faint);}

  .model-list-scroll{
    max-height:280px;
    overflow-y:auto;
    padding:4px 8px 10px;
  }
  .model-list-scroll::-webkit-scrollbar{width:4px;}
  .model-list-scroll::-webkit-scrollbar-thumb{background:rgba(255,90,54,.25); border-radius:2px;}

  .model-option{
    display:flex;align-items:center;gap:10px;
    padding:9px 10px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:background .15s;
  }
  .model-option:hover{background:var(--surface);}
  .model-option.selected{background:var(--accent-dim);}
  .model-option .opt-icon{font-size:1.05rem; flex-shrink:0;}
  .model-option .opt-info{flex:1; min-width:0; display:flex; flex-direction:column; gap:2px;}
  .model-option .opt-name{font-weight:600; font-size:.81rem;}
  .model-option .opt-meta{
    font-size:.62rem; color:var(--text-faint);
    display:flex; gap:5px; flex-wrap:wrap;
  }
  .opt-tag{
    padding:1px 6px;
    border-radius:4px;
    background:var(--surface);
    color:var(--text-dim);
  }
  .no-results{text-align:center; padding:24px; color:var(--text-faint); font-size:.8rem;}

  .topbar-right{display:flex; gap:8px; margin-left:auto;}

  /* ===== CHAT AREA ===== */
  .chat-scroll{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
  }
  .chat-scroll::-webkit-scrollbar{width:5px;}
  .chat-scroll::-webkit-scrollbar-thumb{background:rgba(255,90,54,.2); border-radius:3px;}

  .chat-inner{
    max-width:760px;
    width:100%;
    margin:0 auto;
    padding:18px 18px 28px;
    display:flex;
    flex-direction:column;
    gap:16px;
    flex:1;
  }

  /* WELCOME / EMPTY STATE */
  .welcome{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:22px;
    text-align:center;
    padding:30px 10px;
    animation:fadeIn .5s var(--ease);
  }
  .welcome-mark{
    width:64px;height:64px;
    border-radius:18px;
    background:linear-gradient(150deg,var(--accent),#9a2d14);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:1.7rem;
    color:#0b0c0f;
    box-shadow:0 0 0 1px var(--border), 0 18px 40px -10px rgba(255,90,54,.35);
  }
  .welcome h1{
    font-size:1.5rem;
    font-weight:800;
    letter-spacing:.5px;
  }
  .welcome .sub{
    font-size:.85rem;
    color:var(--text-dim);
    max-width:320px;
    line-height:1.5;
  }

  .suggest-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    width:100%;
    max-width:460px;
    margin-top:6px;
  }
  .suggest-card{
    text-align:left;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:var(--radius-md);
    padding:13px 14px;
    cursor:pointer;
    transition:border-color .2s, transform .2s var(--ease), background .2s;
  }
  .suggest-card:hover{
    border-color:var(--accent);
    background:var(--surface2);
    transform:translateY(-2px);
  }
  .suggest-card .sc-eyebrow{
    font-size:.62rem;
    letter-spacing:1.2px;
    color:var(--accent-soft);
    font-weight:700;
    margin-bottom:4px;
  }
  .suggest-card .sc-text{
    font-size:.8rem;
    color:var(--text-dim);
    line-height:1.4;
  }

  /* MESSAGES */
  .msg{
    display:flex;
    flex-direction:column;
    max-width:84%;
    animation:msgIn .35s var(--ease);
  }
  .msg.user{align-self:flex-end; align-items:flex-end;}
  .msg.ai{align-self:flex-start; align-items:flex-start;}

  .msg .tag{
    font-size:.66rem;
    color:var(--accent-soft);
    margin-bottom:4px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:5px;
  }

  .msg .bubble{
    padding:11px 15px;
    border-radius:16px;
    font-size:.9rem;
    line-height:1.55;
    word-wrap:break-word;
    white-space:pre-wrap;
  }
  .msg.user .bubble{
    background:var(--accent);
    color:#1a0a05;
    font-weight:500;
    border-bottom-right-radius:5px;
  }
  .msg.ai .bubble{
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-bottom-left-radius:5px;
  }

  .loading-row{
    display:flex;align-items:center;gap:8px;
    color:var(--text-dim);
    font-size:.82rem;
  }
  .dot-pulse{display:flex; gap:4px;}
  .dot-pulse span{
    width:6px;height:6px;
    background:var(--accent-soft);
    border-radius:50%;
    animation:bounce 1.1s infinite ease-in-out;
  }
  .dot-pulse span:nth-child(2){animation-delay:.15s;}
  .dot-pulse span:nth-child(3){animation-delay:.3s;}

  /* ===== COMPOSER ===== */
  .composer{
    flex-shrink:0;
    padding:10px 14px 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:760px;
    width:100%;
    margin:0 auto;
  }

  .mode-pills{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:2px;
  }
  .mode-pills::-webkit-scrollbar{display:none;}
  .mode-pill{
    display:flex;align-items:center;gap:6px;
    padding:8px 14px;
    border-radius:20px;
    background:var(--surface);
    border:1px solid var(--border-soft);
    color:var(--text-dim);
    font-size:.78rem;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
    flex-shrink:0;
    transition:border-color .2s, color .2s, background .2s;
  }
  .mode-pill:hover{color:var(--text);}
  .mode-pill.active{
    background:var(--accent-dim);
    border-color:var(--accent);
    color:var(--accent-soft);
  }

  .input-shell{
    display:flex;
    align-items:flex-end;
    gap:8px;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:var(--radius-lg);
    padding:8px 8px 8px 10px;
    transition:border-color .25s;
  }
  .input-shell:focus-within{border-color:var(--accent);}

  .attach-btn{
    width:36px;height:36px;
    border-radius:var(--radius-sm);
    background:transparent;
    border:none;
    color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:color .2s, background .2s;
  }
  .attach-btn:hover{color:var(--text); background:var(--surface2);}

  textarea{
    flex:1;
    background:transparent;
    border:none;
    color:var(--text);
    font-size:.9rem;
    resize:none;
    outline:none;
    font-family:inherit;
    min-height:24px;
    max-height:120px;
    line-height:1.5;
    padding:7px 0;
  }
  textarea::placeholder{color:var(--text-faint);}

  .btn-send{
    width:38px;height:38px;
    border-radius:var(--radius-sm);
    background:var(--accent);
    border:none;
    color:#1a0a05;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    transition:filter .2s, transform .15s;
  }
  .btn-send:hover{filter:brightness(1.08);}
  .btn-send:active{transform:scale(.93);}
  .btn-send:disabled{opacity:.35; cursor:not-allowed; filter:none;}

  .hint-row{
    text-align:center;
    font-size:.66rem;
    color:var(--text-faint);
  }

  /* ===== KEYFRAMES ===== */
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  @keyframes msgIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  @keyframes bounce{0%,80%,100%{transform:translateY(0); opacity:.4;} 40%{transform:translateY(-4px); opacity:1;}}
  @keyframes livepulse{0%,100%{opacity:.4; box-shadow:0 0 0 0 rgba(61,220,132,.5);} 50%{opacity:1; box-shadow:0 0 0 3px rgba(61,220,132,0);}}
  @keyframes slideUpDropdown{from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:translateY(0);}}

  @media (max-width:560px){
    .suggest-grid{grid-template-columns:1fr;}
    .model-selector-wrapper{max-width:170px;}
  }
</style>
</head>
<body>

<div class="app">

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="brand-mark">A</div>
      <div class="brand-name">ABRAS AI</div>
      <button class="sidebar-close" onclick="closeSidebar()" aria-label="Tutup menu">✕</button>
    </div>

    <div class="sidebar-actions">
      <button class="sb-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
        Obrolan Baru
      </button>
      <button class="sb-btn icon-only" id="themeToggle" onclick="toggleTheme()" aria-label="Ganti tema">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="sidebar-divider"></div>
    <div class="history-label">RIWAYAT</div>
    <div class="history-list" id="historyList">
      <div class="history-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Belum ada riwayat obrolan
      </div>
    </div>

    <div class="sidebar-foot">
      <div class="core-pill"><span class="live-dot"></span> Abras Core · Aktif</div>
      <div class="foot-links">
        <a href="#" onclick="return false;">WhatsApp</a>
        <a href="#" onclick="return false;">TikTok</a>
      </div>
      <div class="credit">Abras AI · by <b>Tim Abras</b></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="icon-btn" onclick="openSidebar()" aria-label="Buka menu">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>
      </button>

      <div class="model-selector-wrapper" id="modelSelectorWrapper">
        <div class="model-trigger" id="modelTrigger" onclick="toggleDropdown()">
          <span class="selected-icon" id="selectedIcon">🧠</span>
          <div class="selected-info">
            <span class="selected-name" id="selectedName">GPT-5.5</span>
            <span class="selected-provider" id="selectedProvider">openai</span>
          </div>
          <span class="chevron">▼</span>
        </div>
        <div class="model-dropdown" id="modelDropdown">
          <div class="dropdown-header">
            <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat', this)">💬 Chat</button>
            <button class="tab-btn" data-tab="image" onclick="switchTab('image', this)">🖼️ Image</button>
            <button class="tab-btn" data-tab="video" onclick="switchTab('video', this)">🎬 Video</button>
          </div>
          <input type="text" class="search-box" id="searchModel" placeholder="Cari model..." oninput="filterModels()">
          <div class="model-list-scroll" id="modelListScroll">
            <div class="no-results">Memuat model...</div>
          </div>
        </div>
      </div>

      <div class="topbar-right">
        <button class="icon-btn" id="lockBtn" onclick="toggleLock()" aria-label="Mode privat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        </button>
        <button class="icon-btn" aria-label="Riwayat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="chat-scroll" id="chatScroll">
      <div class="chat-inner" id="chatInner">
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-mark">A</div>
          <h1>ABRAS AI</h1>
          <div class="sub">Tanyakan apapun ke 53 model AI — coding, riset, gambar, sampai video. Pilih model di atas, lalu mulai obrolan.</div>

          <div class="suggest-grid">
            <button class="suggest-card" onclick="useSuggestion(this)">
              <div class="sc-eyebrow">TENTANG ABRAS</div>
              <div class="sc-text">Apa itu Abras AI dan apa bedanya?</div>
            </button>
            <button class="suggest-card" onclick="useSuggestion(this)">
              <div class="sc-eyebrow">KEUNGGULAN</div>
              <div class="sc-text">Apa keunggulan Abras dibanding AI lain?</div>
            </button>
            <button class="suggest-card" onclick="useSuggestion(this)">
              <div class="sc-eyebrow">CARA KERJA</div>
              <div class="sc-text">Bagaimana cara kerja multi-model di Abras?</div>
            </button>
            <button class="suggest-card" onclick="useSuggestion(this)">
              <div class="sc-eyebrow">FITUR</div>
              <div class="sc-text">Fitur apa saja yang tersedia di Abras AI?</div>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="mode-pills">
        <button class="mode-pill" data-mode="coding" onclick="setMode('coding', this)">&lt;&gt; Coding Expert</button>
        <button class="mode-pill active" data-mode="smart" onclick="setMode('smart', this)">✦ Smarts AI</button>
        <button class="mode-pill" data-mode="deep" onclick="setMode('deep', this)">⌕ DeepSearch</button>
      </div>

      <div class="input-shell">
        <button class="attach-btn" aria-label="Lampirkan gambar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
        <textarea id="promptInput" placeholder="Tanya Abras AI..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
          oninput="autoGrow(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendChat()" aria-label="Kirim">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="hint-row">Enter kirim · Shift+Enter baris baru</div>
    </div>
  </main>
</div>

<script>
  // === MODEL DATA (preserved from original — 53 models) ===
  const ALL_MODELS = [
    // CHAT MODELS (24)
    { id: 'openai/gpt-5.5', name: 'GPT-5.5', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
    { id: 'openai/gpt-5.4', name: 'GPT-5.4', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
    { id: 'openai/gpt-5.3', name: 'GPT-5.3', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
    { id: 'openai/gpt-5.1', name: 'GPT-5.1', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
    { id: 'openai/gpt-5', name: 'GPT-5', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
    { id: 'openai/gpt-4o', name: 'GPT-4o', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
    { id: 'openai/gpt-4o-mini', name: 'GPT-4o Mini', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','code'] },
    { id: 'anthropic/claude-opus-4.8', name: 'Claude Opus 4.8', provider: 'anthropic', category: 'chat', icon: '🎭', tags: ['vision','pdf','code','reasoning'] },
    { id: 'anthropic/claude-opus-4.5', name: 'Claude Opus 4.5', provider: 'anthropic', category: 'chat', icon: '🎭', tags: ['vision','pdf','code','reasoning'] },
    { id: 'anthropic/claude-fable-5', name: 'Claude Fable 5', provider: 'anthropic', category: 'chat', icon: '🎭', tags: ['vision','code','reasoning'] },
    { id: 'deepseek/deepseek-v4-pro', name: 'DeepSeek V4 Pro', provider: 'deepseek', category: 'chat', icon: '🔍', tags: ['code','reasoning'] },
    { id: 'deepseek/deepseek-v4-flash', name: 'DeepSeek V4 Flash', provider: 'deepseek', category: 'chat', icon: '🔍', tags: ['code','reasoning'] },
    { id: 'deepseek/deepseek-v3.2-think', name: 'DeepSeek V3.2 Think', provider: 'deepseek', category: 'chat', icon: '🔍', tags: ['code','reasoning'] },
    { id: 'google/gemini-3.1-pro', name: 'Gemini 3.1 Pro', provider: 'google', category: 'chat', icon: '💎', tags: ['vision','pdf','web','code'] },
    { id: 'google/gemini-3.1-flash-lite', name: 'Gemini Flash Lite', provider: 'google', category: 'chat', icon: '💎', tags: ['vision','web','code'] },
    { id: 'xai/grok-4.1', name: 'Grok 4.1', provider: 'xai', category: 'chat', icon: '⚡', tags: ['vision','code'] },
    { id: 'qwen/qwen3-max', name: 'Qwen3 Max', provider: 'qwen', category: 'chat', icon: '🌊', tags: ['vision','code','reasoning'] },
    { id: 'meta/llama-4', name: 'Llama 4', provider: 'meta', category: 'chat', icon: '🦙', tags: ['vision','code'] },
    { id: 'moonshot/kimi', name: 'Kimi', provider: 'moonshot', category: 'chat', icon: '🚀', tags: ['vision','web'] },
    { id: 'mistral/mistral-large', name: 'Mistral Large', provider: 'mistral', category: 'chat', icon: '🌪️', tags: ['code','reasoning'] },
    { id: 'cohere/command-r-plus', name: 'Command R+', provider: 'cohere', category: 'chat', icon: '🎯', tags: ['web','code'] },
    { id: 'ai21/jamba-1.5', name: 'Jamba 1.5', provider: 'ai21', category: 'chat', icon: '🎷', tags: ['code'] },
    { id: 'reka/reka-core', name: 'Reka Core', provider: 'reka', category: 'chat', icon: '🔄', tags: ['vision','code'] },
    { id: 'perplexity/sonar-pro', name: 'Sonar Pro', provider: 'perplexity', category: 'chat', icon: '📡', tags: ['web','search'] },
    // IMAGE MODELS (9)
    { id: 'flux/flux-pro', name: 'Flux Pro', provider: 'flux', category: 'image', icon: '🎨', tags: ['image'] },
    { id: 'google/imagen-4.0', name: 'Imagen 4.0', provider: 'google', category: 'image', icon: '🎨', tags: ['image'] },
    { id: 'openai/gpt-image', name: 'GPT Image', provider: 'openai', category: 'image', icon: '🎨', tags: ['image'] },
    { id: 'xai/grok-imagine', name: 'Grok Imagine', provider: 'xai', category: 'image', icon: '🎨', tags: ['image'] },
    { id: 'recraft/recraft-v4', name: 'Recraft V4', provider: 'recraft', category: 'image', icon: '🎨', tags: ['image'] },
    { id: 'stability/stable-diffusion-3', name: 'Stable Diffusion 3', provider: 'stability', category: 'image', icon: '🎨', tags: ['image'] },
    { id: 'midjourney/midjourney-v7', name: 'Midjourney V7', provider: 'midjourney', category: 'image', icon: '🎨', tags: ['image'] },
    { id: 'leonardo/leonardo-ai', name: 'Leonardo AI', provider: 'leonardo', category: 'image', icon: '🎨', tags: ['image'] },
    { id: 'playground/playground-v3', name: 'Playground V3', provider: 'playground', category: 'image', icon: '🎨', tags: ['image'] },
    // VIDEO MODELS (10)
    { id: 'kling/kling', name: 'Kling', provider: 'kling', category: 'video', icon: '🎬', tags: ['video'] },
    { id: 'google/veo-3.1', name: 'Veo 3.1', provider: 'google', category: 'video', icon: '🎬', tags: ['video'] },
    { id: 'openai/seedance', name: 'Seedance', provider: 'openai', category: 'video', icon: '🎬', tags: ['video'] },
    { id: 'alibaba/wan', name: 'Wan', provider: 'alibaba', category: 'video', icon: '🎬', tags: ['video'] },
    { id: 'runway/gen-4', name: 'Runway Gen-4', provider: 'runway', category: 'video', icon: '🎬', tags: ['video'] },
    { id: 'pika/pika-2', name: 'Pika 2', provider: 'pika', category: 'video', icon: '🎬', tags: ['video'] },
    { id: 'luma/dream-machine', name: 'Dream Machine', provider: 'luma', category: 'video', icon: '🎬', tags: ['video'] },
    { id: 'haiper/haiper-v2', name: 'Haiper V2', provider: 'haiper', category: 'video', icon: '🎬', tags: ['video'] },
    { id: 'moonvalley/moonvalley', name: 'Moonvalley', provider: 'moonvalley', category: 'video', icon: '🎬', tags: ['video'] },
    { id: 'deforum/deforum', name: 'Deforum', provider: 'deforum', category: 'video', icon: '🎬', tags: ['video'] }
  ];

  let selectedModel = ALL_MODELS[0];
  let currentTab = 'chat';
  let currentMode = 'smart';
  let firstMsg = true;
  let isLocked = false;

  const chatInner = document.getElementById('chatInner');
  const chatScroll = document.getElementById('chatScroll');
  const welcomeScreen = document.getElementById('welcomeScreen');
  const promptInput = document.getElementById('promptInput');
  const sendBtn = document.getElementById('sendBtn');
  const searchInput = document.getElementById('searchModel');
  const modelListScroll = document.getElementById('modelListScroll');
  const modelDropdown = document.getElementById('modelDropdown');
  const modelTrigger = document.getElementById('modelTrigger');
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');

  function init(){
    renderModelList();
    updateSelectedDisplay();
  }

  function updateSelectedDisplay(){
    document.getElementById('selectedIcon').textContent = selectedModel.icon;
    document.getElementById('selectedName').textContent = selectedModel.name;
    document.getElementById('selectedProvider').textContent = selectedModel.provider;
  }

  function toggleDropdown(){
    const isOpen = modelDropdown.classList.contains('show');
    if(isOpen){
      modelDropdown.classList.remove('show');
      modelTrigger.classList.remove('open');
    } else {
      modelDropdown.classList.add('show');
      modelTrigger.classList.add('open');
      searchInput.value = '';
      filterModels();
      searchInput.focus();
    }
  }

  function switchTab(tab, btn){
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    filterModels();
  }

  function filterModels(){
    const query = searchInput.value.toLowerCase();
    const filtered = ALL_MODELS.filter(m => {
      const matchCat = m.category === currentTab;
      const matchSearch = !query ||
        m.name.toLowerCase().includes(query) ||
        m.provider.toLowerCase().includes(query) ||
        m.id.toLowerCase().includes(query) ||
        m.tags.some(t => t.includes(query));
      return matchCat && matchSearch;
    });

    if(filtered.length === 0){
      modelListScroll.innerHTML = '<div class="no-results">Tidak ada model ditemukan</div>';
    } else {
      modelListScroll.innerHTML = filtered.map(m => `
        <div class="model-option ${m.id === selectedModel.id ? 'selected' : ''}"
             onclick="selectModel('${m.id}')">
          <span class="opt-icon">${m.icon}</span>
          <div class="opt-info">
            <span class="opt-name">${m.name}</span>
            <span class="opt-meta">
              <span>${m.provider}</span>
              ${m.tags.map(t => `<span class="opt-tag">${t}</span>`).join('')}
            </span>
          </div>
        </div>
      `).join('');
    }
  }

  function selectModel(id){
    const found = ALL_MODELS.find(m => m.id === id);
    if(found){
      selectedModel = found;
      updateSelectedDisplay();
      modelDropdown.classList.remove('show');
      modelTrigger.classList.remove('open');
      renderModelList();
    }
  }

  function renderModelList(){ filterModels(); }

  document.addEventListener('click', (e) => {
    const wrapper = document.getElementById('modelSelectorWrapper');
    if(!wrapper.contains(e.target)){
      modelDropdown.classList.remove('show');
      modelTrigger.classList.remove('open');
    }
  });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape'){
      modelDropdown.classList.remove('show');
      modelTrigger.classList.remove('open');
      closeSidebar();
    }
  });

  // === SIDEBAR ===
  function openSidebar(){
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('show');
  }
  function closeSidebar(){
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('show');
  }
  function newChat(){
    chatInner.innerHTML = '';
    chatInner.appendChild(welcomeScreen);
    firstMsg = true;
    closeSidebar();
  }
  function toggleTheme(){
    document.body.classList.toggle('light-mode');
  }
  function toggleLock(){
    isLocked = !isLocked;
    document.getElementById('lockBtn').classList.toggle('active', isLocked);
  }

  // === MODE PILLS ===
  function setMode(mode, btn){
    currentMode = mode;
    document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
  }

  // === SUGGESTIONS ===
  function useSuggestion(card){
    const text = card.querySelector('.sc-text').textContent;
    promptInput.value = text;
    sendChat();
  }

  // === TEXTAREA AUTOGROW ===
  function autoGrow(el){
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // === CHAT ===
  async function sendChat(){
    const prompt = promptInput.value.trim();
    if(!prompt) return;

    if(firstMsg){
      chatInner.innerHTML = '';
      firstMsg = false;
    }

    chatInner.insertAdjacentHTML('beforeend', `
      <div class="msg user">
        <div class="bubble">${escapeHtml(prompt)}</div>
      </div>
    `);

    const loadingId = 'loading-' + Date.now();
    chatInner.insertAdjacentHTML('beforeend', `
      <div class="msg ai" id="${loadingId}">
        <div class="tag">${selectedModel.icon} ${selectedModel.name}</div>
        <div class="bubble">
          <div class="loading-row">
            <div class="dot-pulse"><span></span><span></span><span></span></div>
            <span>Berpikir...</span>
          </div>
        </div>
      </div>
    `);

    promptInput.value = '';
    autoGrow(promptInput);
    sendBtn.disabled = true;
    chatScroll.scrollTop = chatScroll.scrollHeight;

    try{
      const res = await fetch('/api/chat', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ prompt, model: selectedModel.id, mode: currentMode })
      });
      const data = await res.json();

      const loadingEl = document.getElementById(loadingId);
      if(loadingEl){
        if(data.response){
          loadingEl.innerHTML = `
            <div class="tag">${selectedModel.icon} ${selectedModel.name}</div>
            <div class="bubble">${escapeHtml(data.response)}</div>
          `;
        } else {
          loadingEl.innerHTML = `
            <div class="tag">${selectedModel.icon} ${selectedModel.name}</div>
            <div class="bubble" style="color:#ff8a7a;">${escapeHtml(data.error || 'Gagal mendapatkan response')}</div>
          `;
        }
      }
    } catch(e){
      const loadingEl = document.getElementById(loadingId);
      if(loadingEl){
        loadingEl.innerHTML = `<div class="bubble" style="color:#ff8a7a;">${escapeHtml(e.message)}</div>`;
      }
    }

    sendBtn.disabled = false;
    promptInput.focus();
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function escapeHtml(text){
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  init();
</script>
</body>
</html>
