<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OxyX AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #07070d;
    --surface: #0e0e18;
    --surface2: #141422;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(124,58,237,0.4);
    --accent: #7c3aed;
    --accent-glow: rgba(124,58,237,0.15);
    --accent-light: #a78bfa;
    --text: #f1f1f5;
    --text2: #6b7280;
    --text3: #9ca3af;
    --user-bubble: #7c3aed;
    --ai-bubble: #111120;
    --radius: 16px;
    --radius-sm: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    gap: 6px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 20px rgba(124,58,237,0.35);
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo-text span {
    color: var(--text2);
    font-weight: 400;
    font-size: 11px;
    display: block;
    letter-spacing: 0;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text2);
    padding: 4px 10px;
    margin-top: 8px;
  }

  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--accent-glow);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: var(--radius-sm);
    color: var(--accent-light);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
  }

  .new-chat-btn:hover {
    background: rgba(124,58,237,0.2);
    border-color: rgba(124,58,237,0.5);
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12.5px;
    color: var(--text3);
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-item:hover { background: var(--surface2); color: var(--text); }
  .history-item.active { background: var(--surface2); color: var(--text); }

  .history-item svg { flex-shrink: 0; opacity: 0.5; }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 10px 0;
  }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .user-info { flex: 1; overflow: hidden; }
  .user-info .name { font-size: 12.5px; font-weight: 600; }
  .user-info .plan { font-size: 10.5px; color: var(--text2); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 10;
  }

  /* MODEL PICKER */
  .model-picker-wrapper { position: relative; }

  .model-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }

  .model-pill:hover {
    border-color: var(--border-hover);
    background: var(--surface2);
  }

  .model-pill.open {
    border-color: var(--border-hover);
    background: var(--surface2);
  }

  .pill-icon { font-size: 14px; line-height: 1; }

  .pill-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }

  .pill-provider {
    font-size: 10.5px;
    color: var(--text2);
    padding: 2px 7px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    white-space: nowrap;
  }

  .pill-chevron {
    color: var(--text2);
    transition: transform 0.2s cubic-bezier(.4,0,.2,1);
    font-size: 10px;
    margin-left: 2px;
  }

  .model-pill.open .pill-chevron { transform: rotate(180deg); }

  /* MODEL DROPDOWN */
  .model-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    width: 420px;
    background: #0f0f1e;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    z-index: 200;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,58,237,0.1);
    opacity: 0;
    transform: translateY(-6px) scale(0.98);
    pointer-events: none;
    transition: opacity 0.18s cubic-bezier(.4,0,.2,1), transform 0.18s cubic-bezier(.4,0,.2,1);
    transform-origin: top left;
  }

  .model-dropdown.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  .dropdown-top {
    padding: 14px 14px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .dropdown-tabs {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 3px;
  }

  .tab-btn {
    flex: 1;
    padding: 6px 0;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .tab-btn:not(.active):hover { color: var(--text); }

  .search-input {
    width: 100%;
    padding: 9px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: var(--text2); }
  .search-input:focus { border-color: var(--border-hover); }

  .model-list {
    max-height: 320px;
    overflow-y: auto;
    padding: 8px 8px 10px;
    margin-top: 8px;
  }

  .model-list::-webkit-scrollbar { width: 3px; }
  .model-list::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.25); border-radius: 2px; }

  .model-group-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    color: var(--text2);
    padding: 8px 8px 4px;
  }

  .model-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
  }

  .model-option:hover { background: rgba(255,255,255,0.04); }

  .model-option.active {
    background: var(--accent-glow);
  }

  .model-option.active::after {
    content: '✓';
    position: absolute;
    right: 10px;
    color: var(--accent-light);
    font-size: 12px;
    font-weight: 700;
  }

  .opt-icon-wrap {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: rgba(255,255,255,0.04);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .opt-info { flex: 1; min-width: 0; }

  .opt-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .opt-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }

  .opt-provider {
    font-size: 10.5px;
    color: var(--text2);
  }

  .opt-tag {
    font-size: 9.5px;
    padding: 1px 5px;
    border-radius: 4px;
    background: rgba(124,58,237,0.15);
    color: var(--accent-light);
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .no-results {
    text-align: center;
    padding: 24px;
    color: var(--text2);
    font-size: 13px;
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: var(--text2);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e88;
    animation: pulseDot 2.5s ease-in-out infinite;
  }

  @keyframes pulseDot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── CHAT ── */
  .chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-scroll::-webkit-scrollbar { width: 4px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 2px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text2);
    text-align: center;
    padding: 40px;
    animation: fadeIn 0.4s ease;
  }

  .empty-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: var(--accent-glow);
    border: 1px solid rgba(124,58,237,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }

  .empty-state h2 { font-size: 17px; font-weight: 600; color: var(--text3); }
  .empty-state p { font-size: 13px; max-width: 300px; line-height: 1.6; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 4px;
  }

  .suggestion-chip {
    padding: 7px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    font-size: 12.5px;
    color: var(--text3);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .suggestion-chip:hover {
    border-color: var(--border-hover);
    color: var(--text);
    background: var(--surface2);
  }

  /* MESSAGES */
  .msg-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.22s cubic-bezier(.4,0,.2,1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .msg-group.user { align-items: flex-end; }
  .msg-group.ai { align-items: flex-start; }

  .msg-label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text2);
    padding: 0 4px;
    letter-spacing: 0.2px;
  }

  .bubble {
    max-width: 72%;
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-group.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 5px;
  }

  .msg-group.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
    color: var(--text);
  }

  /* TYPING */
  .typing-bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 13px 16px;
  }

  .typing-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text2);
    animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.18s; }
  .typing-dot:nth-child(3) { animation-delay: 0.36s; }

  @keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── INPUT BAR ── */
  .input-bar {
    padding: 14px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within { border-color: var(--border-hover); }

  .input-wrap textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13.5px;
    font-family: inherit;
    resize: none;
    line-height: 1.5;
    min-height: 22px;
    max-height: 120px;
    overflow-y: auto;
  }

  .input-wrap textarea::placeholder { color: var(--text2); }

  .input-wrap textarea::-webkit-scrollbar { width: 3px; }
  .input-wrap textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .send-btn {
    width: 34px; height: 34px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
  }

  .send-btn:hover { background: #6d28d9; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 15px; height: 15px; }

  .input-hint {
    font-size: 10.5px;
    color: var(--text2);
    margin-top: 7px;
    padding: 0 2px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .model-dropdown { width: calc(100vw - 32px); }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">🤖</div>
    <div class="logo-text">
      OxyX AI
      <span>53 Models · Anonymous</span>
    </div>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    New Chat
  </button>

  <div class="sidebar-label">Recent</div>

  <div class="history-item active">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    New conversation
  </div>

  <div class="sidebar-footer">
    <div class="avatar">A</div>
    <div class="user-info">
      <div class="name">Anonymous</div>
      <div class="plan">Free plan</div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="model-picker-wrapper" id="pickerWrapper">
      <div class="model-pill" id="modelPill" onclick="togglePicker()">
        <span class="pill-icon" id="pillIcon">🧠</span>
        <span class="pill-name" id="pillName">GPT-5.5</span>
        <span class="pill-provider" id="pillProvider">openai</span>
        <span class="pill-chevron">▼</span>
      </div>

      <div class="model-dropdown" id="modelDropdown">
        <div class="dropdown-top">
          <div class="dropdown-tabs">
            <button class="tab-btn active" onclick="switchTab('chat', this)">💬 Chat</button>
            <button class="tab-btn" onclick="switchTab('image', this)">🖼️ Image</button>
            <button class="tab-btn" onclick="switchTab('video', this)">🎬 Video</button>
          </div>
          <input class="search-input" id="searchInput" placeholder="Search models…" oninput="filterModels()" />
        </div>
        <div class="model-list" id="modelList"></div>
      </div>
    </div>

    <div class="topbar-right">
      <div class="status-dot">
        <div class="dot"></div>
        <span id="statusText">Online</span>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-scroll" id="chatScroll">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✨</div>
      <h2>Tanyakan apapun</h2>
      <p>Akses 53 model AI dari satu tempat — chat, gambar, dan video.</p>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="usePrompt('Jelaskan cara kerja AI dengan sederhana')">Cara kerja AI</div>
        <div class="suggestion-chip" onclick="usePrompt('Tulis kode Python untuk sorting array')">Kode Python</div>
        <div class="suggestion-chip" onclick="usePrompt('Bantu saya brainstorming ide startup')">Ide startup</div>
        <div class="suggestion-chip" onclick="usePrompt('Terjemahkan teks ini ke Inggris')">Terjemahkan</div>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="promptInput" placeholder="Tulis pesan…" rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendChat()">
        <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter kirim · Shift+Enter baris baru</div>
  </div>

</main>

<script>
const MODELS = [
  // CHAT
  { id:'openai/gpt-5.5', name:'GPT-5.5', provider:'openai', cat:'chat', icon:'🧠', tags:['vision','pdf','web','code'] },
  { id:'openai/gpt-5.4', name:'GPT-5.4', provider:'openai', cat:'chat', icon:'🧠', tags:['vision','pdf','web'] },
  { id:'openai/gpt-5.3', name:'GPT-5.3', provider:'openai', cat:'chat', icon:'🧠', tags:['vision','pdf'] },
  { id:'openai/gpt-5.1', name:'GPT-5.1', provider:'openai', cat:'chat', icon:'🧠', tags:['vision'] },
  { id:'openai/gpt-5', name:'GPT-5', provider:'openai', cat:'chat', icon:'🧠', tags:['vision','code'] },
  { id:'openai/gpt-4o', name:'GPT-4o', provider:'openai', cat:'chat', icon:'🧠', tags:['vision','web'] },
  { id:'openai/gpt-4o-mini', name:'GPT-4o Mini', provider:'openai', cat:'chat', icon:'🧠', tags:['code'] },
  { id:'anthropic/claude-opus-4.8', name:'Claude Opus 4.8', provider:'anthropic', cat:'chat', icon:'🎭', tags:['reasoning','pdf'] },
  { id:'anthropic/claude-opus-4.5', name:'Claude Opus 4.5', provider:'anthropic', cat:'chat', icon:'🎭', tags:['reasoning'] },
  { id:'anthropic/claude-fable-5', name:'Claude Fable 5', provider:'anthropic', cat:'chat', icon:'🎭', tags:['vision','code'] },
  { id:'deepseek/deepseek-v4-pro', name:'DeepSeek V4 Pro', provider:'deepseek', cat:'chat', icon:'🔍', tags:['code','reasoning'] },
  { id:'deepseek/deepseek-v4-flash', name:'DeepSeek V4 Flash', provider:'deepseek', cat:'chat', icon:'🔍', tags:['code'] },
  { id:'deepseek/deepseek-v3.2-think', name:'DeepSeek V3.2 Think', provider:'deepseek', cat:'chat', icon:'🔍', tags:['reasoning'] },
  { id:'google/gemini-3.1-pro', name:'Gemini 3.1 Pro', provider:'google', cat:'chat', icon:'💎', tags:['vision','web','pdf'] },
  { id:'google/gemini-3.1-flash-lite', name:'Gemini Flash Lite', provider:'google', cat:'chat', icon:'💎', tags:['vision','web'] },
  { id:'xai/grok-4.1', name:'Grok 4.1', provider:'xai', cat:'chat', icon:'⚡', tags:['vision','web'] },

let selected = MODELS[0];
let tab = 'chat';
let isFirst = true;

// ── PICKER ──
function togglePicker() {
  const dd = document.getElementById('modelDropdown');
  const pill = document.getElementById('modelPill');
  const isOpen = dd.classList.contains('show');
  if (isOpen) {
    dd.classList.remove('show');
    pill.classList.remove('open');
  } else {
    dd.classList.add('show');
    pill.classList.add('open');
    document.getElementById('searchInput').value = '';
    filterModels();
    setTimeout(() => document.getElementById('searchInput').focus(), 80);
  }
}

function closePicker() {
  document.getElementById('modelDropdown').classList.remove('show');
  document.getElementById('modelPill').classList.remove('open');
}

document.addEventListener('click', e => {
  if (!document.getElementById('pickerWrapper').contains(e.target)) closePicker();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePicker();
});

function switchTab(t, btn) {
  tab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value = '';
  filterModels();
}

function filterModels() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('modelList');

  const filtered = MODELS.filter(m => {
    if (m.cat !== tab) return false;
    if (!q) return true;
    return m.name.toLowerCase().includes(q) ||
           m.provider.toLowerCase().includes(q) ||
           m.tags.some(t => t.includes(q));
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">No models found</div>';
    return;
  }

  // Group by provider
  const groups = {};
  filtered.forEach(m => {
    if (!groups[m.provider]) groups[m.provider] = [];
    groups[m.provider].push(m);
  });

  let html = '';
  for (const [prov, models] of Object.entries(groups)) {
    if (Object.keys(groups).length > 1) {
      html += `<div class="model-group-label">${prov}</div>`;
    }
    models.forEach(m => {
      const isActive = m.id === selected.id;
      html += `
        <div class="model-option ${isActive ? 'active' : ''}" onclick="selectModel('${m.id}')">
          <div class="opt-icon-wrap">${m.icon}</div>
          <div class="opt-info">
            <div class="opt-name">${m.name}</div>
            <div class="opt-meta">
              <span class="opt-provider">${m.provider}</span>
              ${m.tags.slice(0,3).map(t => `<span class="opt-tag">${t}</span>`).join('')}
            </div>
          </div>
        </div>`;
    });
  }
  list.innerHTML = html;
}

function selectModel(id) {
  const m = MODELS.find(x => x.id === id);
  if (!m) return;
  selected = m;
  document.getElementById('pillIcon').textContent = m.icon;
  document.getElementById('pillName').textContent = m.name;
  document.getElementById('pillProvider').textContent = m.provider;
  closePicker();
  filterModels();
}

// ── CHAT ──
function usePrompt(text) {
  document.getElementById('promptInput').value = text;
  autoResize(document.getElementById('promptInput'));
  sendChat();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function newChat() {
  const scroll = document.getElementById('chatScroll');
  scroll.innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✨</div>
      <h2>Tanyakan apapun</h2>
      <p>Akses 53 model AI dari satu tempat — chat, gambar, dan video.</p>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="usePrompt('Jelaskan cara kerja AI dengan sederhana')">Cara kerja AI</div>
        <div class="suggestion-chip" onclick="usePrompt('Tulis kode Python untuk sorting array')">Kode Python</div>
        <div class="suggestion-chip" onclick="usePrompt('Bantu saya brainstorming ide startup')">Ide startup</div>
        <div class="suggestion-chip" onclick="usePrompt('Terjemahkan teks ini ke Inggris')">Terjemahkan</div>
      </div>
    </div>`;
  isFirst = true;
}

async function sendChat() {
  const input = document.getElementById('promptInput');
  const prompt = input.value.trim();
  if (!prompt) return;

  const scroll = document.getElementById('chatScroll');

  // Clear empty state
  if (isFirst) {
    scroll.innerHTML = '';
    isFirst = false;
  }

  // User message
  addMsg('user', 'You', prompt);
  input.value = '';
  input.style.height = 'auto';

  // AI loading
  const loadId = 'load-' + Date.now();
  scroll.insertAdjacentHTML('beforeend', `
    <div class="msg-group ai" id="${loadId}">
      <div class="msg-label">${selected.icon} ${selected.name}</div>
      <div class="bubble">
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>`);

  document.getElementById('sendBtn').disabled = true;
  document.getElementById('statusText').textContent = 'Thinking…';
  scroll.scrollTop = scroll.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, model: selected.id })
    });
    const data = await res.json();
    const el = document.getElementById(loadId);
    if (el) {
      if (data.response) {
        el.querySelector('.bubble').textContent = data.response;
      } else {
        el.querySelector('.bubble').innerHTML = `<span style="color:#f87171">❌ ${esc(data.error || 'Gagal')}</span>`;
      }
    }
    document.getElementById('statusText').textContent = 'Online';
  } catch(e) {
    const el = document.getElementById(loadId);
    if (el) el.querySelector('.bubble').innerHTML = `<span style="color:#f87171">❌ Koneksi gagal</span>`;
    document.getElementById('statusText').textContent = 'Offline';
  }

  document.getElementById('sendBtn').disabled = false;
  scroll.scrollTop = scroll.scrollHeight;
}

function addMsg(role, label, text) {
  const scroll = document.getElementById('chatScroll');
  const div = document.createElement('div');
  div.className = `msg-group ${role}`;
  div.innerHTML = `
    <div class="msg-label">${label}</div>
    <div class="bubble">${esc(text)}</div>`;
  scroll.appendChild(div);
  scroll.scrollTop = scroll.scrollHeight;
}

function esc(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// init
filterModels();
