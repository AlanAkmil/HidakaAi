<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyX AI · Multi AI Scraper</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --accent: #7c3aed;
            --accent2: #a78bfa;
            --text: #e2e8f0;
            --text2: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 760px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 95vh;
        }

        .header {
            text-align: center;
            padding: 4px 0;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header span {
            font-size: 0.7rem;
            color: var(--text2);
            letter-spacing: 2px;
        }

        /* MODEL SELECTOR ENHANCED */
        .model-selector-wrapper {
            position: relative;
        }

        .model-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: all .2s;
            user-select: none;
        }

        .model-trigger:hover { border-color: var(--accent); }

        .model-trigger .selected-icon {
            font-size: 1.4rem;
        }

        .model-trigger .selected-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .model-trigger .selected-name {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .model-trigger .selected-provider {
            font-size: 0.7rem;
            color: var(--text2);
        }

        .model-trigger .chevron {
            color: var(--text2);
            transition: transform .2s;
            font-size: 0.8rem;
        }

        .model-trigger.open .chevron {
            transform: rotate(180deg);
        }

        .model-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 6px;
            background: #181825;
            border: 1px solid var(--border);
            border-radius: 14px;
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
            animation: slideDown .2s ease;
        }

        .model-dropdown.show { display: block; }

        .dropdown-header {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all .2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: rgba(124,58,237,0.2);
            border-color: var(--accent);
            color: var(--accent2);
        }

        .tab-btn:hover { color: var(--text); }

        .search-box {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            margin: 8px 12px;
            width: calc(100% - 24px);
        }

        .search-box:focus { border-color: var(--accent); }

        .model-list-scroll {
            max-height: 300px;
            overflow-y: auto;
            padding: 4px 8px 8px;
        }

        .model-list-scroll::-webkit-scrollbar { width: 4px; }
        .model-list-scroll::-webkit-scrollbar-thumb {
            background: rgba(124,58,237,0.3);
            border-radius: 2px;
        }

        .model-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all .15s;
            font-size: 0.85rem;
        }

        .model-option:hover { background: rgba(124,58,237,0.1); }
        .model-option.selected { background: rgba(124,58,237,0.2); }

        .model-option .opt-icon { font-size: 1.2rem; }

        .model-option .opt-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .model-option .opt-name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .model-option .opt-meta {
            font-size: 0.65rem;
            color: var(--text2);
            display: flex;
            gap: 6px;
        }

        .model-option .opt-tag {
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.6rem;
            background: rgba(124,58,237,0.2);
            color: var(--accent2);
        }

        .no-results {
            text-align: center;
            padding: 20px;
            color: var(--text2);
            font-size: 0.8rem;
        }

        .chat-area {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(124,58,237,0.3);
            border-radius: 2px;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeUp .3s ease;
        }

        .msg.user { align-self: flex-end; }
        .msg.ai { align-self: flex-start; }

        .msg .bubble {
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg.user .bubble {
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg.ai .bubble {
            background: #1a1a26;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg .tag {
            font-size: 0.65rem;
            color: var(--accent2);
            margin-bottom: 3px;
            font-weight: 600;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        textarea {
            flex: 1;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 0.9rem;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: border .2s;
            min-height: 48px;
            max-height: 100px;
        }

        textarea:focus { border-color: var(--accent); }

        .btn-send {
            padding: 12px 22px;
            background: var(--accent);
            border: none;
            border-radius: 14px;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all .2s;
        }

        .btn-send:hover { filter: brightness(1.1); }
        .btn-send:disabled { opacity: .4; cursor: not-allowed; filter: none; }

        .loading-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text2);
            font-size: 0.8rem;
        }

        .dot-pulse {
            width: 6px; height: 6px;
            background: var(--accent2);
            border-radius: 50%;
            animation: pulse .8s infinite;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        .empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            font-size: 0.85rem;
            text-align: center;
        }

        .footer {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text2);
        }

        .footer .dot {
            width: 6px; height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 OxyX AI</h1>
            <span>53 MODEL · ANONYMOUS</span>
        </div>

        <!-- MODEL SELECTOR DROPDOWN -->
        <div class="model-selector-wrapper" id="modelSelectorWrapper">
            <div class="model-trigger" id="modelTrigger" onclick="toggleDropdown()">
                <span class="selected-icon" id="selectedIcon">🧠</span>
                <div class="selected-info">
                    <span class="selected-name" id="selectedName">GPT-5.5</span>
                    <span class="selected-provider" id="selectedProvider">openai</span>
                </div>
                <span class="chevron">▼</span>
            </div>
            <div class="model-dropdown" id="modelDropdown">
                <div class="dropdown-header">
                    <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat', this)">💬 Chat</button>
                    <button class="tab-btn" data-tab="image" onclick="switchTab('image', this)">🖼️ Image</button>
                    <button class="tab-btn" data-tab="video" onclick="switchTab('video', this)">🎬 Video</button>
                </div>
                <input type="text" class="search-box" id="searchModel" placeholder="🔍 Cari model..." oninput="filterModels()">
                <div class="model-list-scroll" id="modelListScroll">
                    <div class="no-results">⏳ Memuat model...</div>
                </div>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty">✨ Tanyakan apapun ke 53 model AI...</div>
        </div>

        <div class="input-row">
            <textarea id="promptInput" placeholder="Ketik prompt..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendChat()">Kirim</button>
        </div>

        <div class="footer">
            <div class="dot"></div>
            <span id="statusText">Online · Siap digunakan</span>
        </div>
    </div>

    <script>
        // === STATE ===
        const ALL_MODELS = [
            // CHAT MODELS (24)
            { id: 'openai/gpt-5.5', name: 'GPT-5.5', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
            { id: 'openai/gpt-5.4', name: 'GPT-5.4', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
            { id: 'openai/gpt-5.3', name: 'GPT-5.3', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
            { id: 'openai/gpt-5.1', name: 'GPT-5.1', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
            { id: 'openai/gpt-5', name: 'GPT-5', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
            { id: 'openai/gpt-4o', name: 'GPT-4o', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','pdf','web','code'] },
            { id: 'openai/gpt-4o-mini', name: 'GPT-4o Mini', provider: 'openai', category: 'chat', icon: '🧠', tags: ['vision','code'] },
            { id: 'anthropic/claude-opus-4.8', name: 'Claude Opus 4.8', provider: 'anthropic', category: 'chat', icon: '🎭', tags: ['vision','pdf','code','reasoning'] },
            { id: 'anthropic/claude-opus-4.5', name: 'Claude Opus 4.5', provider: 'anthropic', category: 'chat', icon: '🎭', tags: ['vision','pdf','code','reasoning'] },
            { id: 'anthropic/claude-fable-5', name: 'Claude Fable 5', provider: 'anthropic', category: 'chat', icon: '🎭', tags: ['vision','code','reasoning'] },
            { id: 'deepseek/deepseek-v4-pro', name: 'DeepSeek V4 Pro', provider: 'deepseek', category: 'chat', icon: '🔍', tags: ['code','reasoning'] },
            { id: 'deepseek/deepseek-v4-flash', name: 'DeepSeek V4 Flash', provider: 'deepseek', category: 'chat', icon: '🔍', tags: ['code','reasoning'] },
            { id: 'deepseek/deepseek-v3.2-think', name: 'DeepSeek V3.2 Think', provider: 'deepseek', category: 'chat', icon: '🔍', tags: ['code','reasoning'] },
            { id: 'google/gemini-3.1-pro', name: 'Gemini 3.1 Pro', provider: 'google', category: 'chat', icon: '💎', tags: ['vision','pdf','web','code'] },
            { id: 'google/gemini-3.1-flash-lite', name: 'Gemini Flash Lite', provider: 'google', category: 'chat', icon: '💎', tags: ['vision','web','code'] },
            { id: 'xai/grok-4.1', name: 'Grok 4.1', provider: 'xai', category: 'chat', icon: '⚡', tags: ['vision','code'] },
            { id: 'qwen/qwen3-max', name: 'Qwen3 Max', provider: 'qwen', category: 'chat', icon: '🌊', tags: ['vision','code','reasoning'] },
            { id: 'meta/llama-4', name: 'Llama 4', provider: 'meta', category: 'chat', icon: '🦙', tags: ['vision','code'] },
            { id: 'moonshot/kimi', name: 'Kimi', provider: 'moonshot', category: 'chat', icon: '🚀', tags: ['vision','web'] },
            { id: 'mistral/mistral-large', name: 'Mistral Large', provider: 'mistral', category: 'chat', icon: '🌪️', tags: ['code','reasoning'] },
            { id: 'cohere/command-r-plus', name: 'Command R+', provider: 'cohere', category: 'chat', icon: '🎯', tags: ['web','code'] },
            { id: 'ai21/jamba-1.5', name: 'Jamba 1.5', provider: 'ai21', category: 'chat', icon: '🎷', tags: ['code'] },
            { id: 'reka/reka-core', name: 'Reka Core', provider: 'reka', category: 'chat', icon: '🔄', tags: ['vision','code'] },
            { id: 'perplexity/sonar-pro', name: 'Sonar Pro', provider: 'perplexity', category: 'chat', icon: '📡', tags: ['web','search'] },
            // IMAGE MODELS (9)
            { id: 'flux/flux-pro', name: 'Flux Pro', provider: 'flux', category: 'image', icon: '🎨', tags: ['image'] },
            { id: 'google/imagen-4.0', name: 'Imagen 4.0', provider: 'google', category: 'image', icon: '🎨', tags: ['image'] },
            { id: 'openai/gpt-image', name: 'GPT Image', provider: 'openai', category: 'image', icon: '🎨', tags: ['image'] },
            { id: 'xai/grok-imagine', name: 'Grok Imagine', provider: 'xai', category: 'image', icon: '🎨', tags: ['image'] },
            { id: 'recraft/recraft-v4', name: 'Recraft V4', provider: 'recraft', category: 'image', icon: '🎨', tags: ['image'] },
            { id: 'stability/stable-diffusion-3', name: 'Stable Diffusion 3', provider: 'stability', category: 'image', icon: '🎨', tags: ['image'] },
            { id: 'midjourney/midjourney-v7', name: 'Midjourney V7', provider: 'midjourney', category: 'image', icon: '🎨', tags: ['image'] },
            { id: 'leonardo/leonardo-ai', name: 'Leonardo AI', provider: 'leonardo', category: 'image', icon: '🎨', tags: ['image'] },
            { id: 'playground/playground-v3', name: 'Playground V3', provider: 'playground', category: 'image', icon: '🎨', tags: ['image'] },
            // VIDEO MODELS (10)
            { id: 'kling/kling', name: 'Kling', provider: 'kling', category: 'video', icon: '🎬', tags: ['video'] },
            { id: 'google/veo-3.1', name: 'Veo 3.1', provider: 'google', category: 'video', icon: '🎬', tags: ['video'] },
            { id: 'openai/seedance', name: 'Seedance', provider: 'openai', category: 'video', icon: '🎬', tags: ['video'] },
            { id: 'alibaba/wan', name: 'Wan', provider: 'alibaba', category: 'video', icon: '🎬', tags: ['video'] },
            { id: 'runway/gen-4', name: 'Runway Gen-4', provider: 'runway', category: 'video', icon: '🎬', tags: ['video'] },
            { id: 'pika/pika-2', name: 'Pika 2', provider: 'pika', category: 'video', icon: '🎬', tags: ['video'] },
            { id: 'luma/dream-machine', name: 'Dream Machine', provider: 'luma', category: 'video', icon: '🎬', tags: ['video'] },
            { id: 'haiper/haiper-v2', name: 'Haiper V2', provider: 'haiper', category: 'video', icon: '🎬', tags: ['video'] },
            { id: 'moonvalley/moonvalley', name: 'Moonvalley', provider: 'moonvalley', category: 'video', icon: '🎬', tags: ['video'] },
            { id: 'deforum/deforum', name: 'Deforum', provider: 'deforum', category: 'video', icon: '🎬', tags: ['video'] }
        ];

        let selectedModel = ALL_MODELS[0];
        let currentTab = 'chat';
        let firstMsg = true;

        const chatArea = document.getElementById('chatArea');
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusText = document.getElementById('statusText');
        const searchInput = document.getElementById('searchModel');
        const modelListScroll = document.getElementById('modelListScroll');
        const modelDropdown = document.getElementById('modelDropdown');
        const modelTrigger = document.getElementById('modelTrigger');

        // === INIT ===
        function init() {
            renderModelList();
            updateSelectedDisplay();
        }

        function updateSelectedDisplay() {
            document.getElementById('selectedIcon').textContent = selectedModel.icon;
            document.getElementById('selectedName').textContent = selectedModel.name;
            document.getElementById('selectedProvider').textContent = selectedModel.provider;
        }

        function toggleDropdown() {
            const isOpen = modelDropdown.classList.contains('show');
            if (isOpen) {
                modelDropdown.classList.remove('show');
                modelTrigger.classList.remove('open');
            } else {
                modelDropdown.classList.add('show');
                modelTrigger.classList.add('open');
                searchInput.value = '';
                filterModels();
                searchInput.focus();
            }
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            searchInput.value = '';
            filterModels();
        }

        function filterModels() {
            const query = searchInput.value.toLowerCase();
            const filtered = ALL_MODELS.filter(m => {
                const matchCat = m.category === currentTab;
                const matchSearch = !query || 
                    m.name.toLowerCase().includes(query) || 
                    m.provider.toLowerCase().includes(query) ||
                    m.id.toLowerCase().includes(query) ||
                    m.tags.some(t => t.includes(query));
                return matchCat && matchSearch;
            });

            if (filtered.length === 0) {
                modelListScroll.innerHTML = '<div class="no-results">😕 Tidak ada model ditemukan</div>';
            } else {
                modelListScroll.innerHTML = filtered.map(m => `
                    <div class="model-option ${m.id === selectedModel.id ? 'selected' : ''}" 
                         onclick="selectModel('${m.id}')">
                        <span class="opt-icon">${m.icon}</span>
                        <div class="opt-info">
                            <span class="opt-name">${m.name}</span>
                            <span class="opt-meta">
                                <span>${m.provider}</span>
                                ${m.tags.map(t => `<span class="opt-tag">${t}</span>`).join('')}
                            </span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function selectModel(id) {
            const found = ALL_MODELS.find(m => m.id === id);
            if (found) {
                selectedModel = found;
                updateSelectedDisplay();
                modelDropdown.classList.remove('show');
                modelTrigger.classList.remove('open');
                renderModelList();
            }
        }

        function renderModelList() {
            filterModels();
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('modelSelectorWrapper');
            if (!wrapper.contains(e.target)) {
                modelDropdown.classList.remove('show');
                modelTrigger.classList.remove('open');
            }
        });

        // === CHAT ===
        async function sendChat() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            if (firstMsg) {
                chatArea.innerHTML = '';
                firstMsg = false;
            }

            // Add user message
            chatArea.insertAdjacentHTML('beforeend', `
                <div class="msg user">
                    <div class="bubble">${escapeHtml(prompt)}</div>
                </div>
            `);

            // Add loading
            const loadingId = 'loading-' + Date.now();
            chatArea.insertAdjacentHTML('beforeend', `
                <div class="msg ai" id="${loadingId}">
                    <div class="tag">${selectedModel.icon} ${selectedModel.name}</div>
                    <div class="bubble">
                        <div class="loading-row">
                            <div class="dot-pulse"></div>
                            <span>Berpikir...</span>
                        </div>
                    </div>
                </div>
            `);

            promptInput.value = '';
            sendBtn.disabled = true;
            statusText.textContent = 'Mengirim...';
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, model: selectedModel.id })
                });
                const data = await res.json();

                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) {
                    if (data.response) {
                        loadingEl.innerHTML = `
                            <div class="tag">${selectedModel.icon} ${selectedModel.name}</div>
                            <div class="bubble">${escapeHtml(data.response)}</div>
                        `;
                        statusText.textContent = 'Online · Siap digunakan';
                    } else {
                        loadingEl.innerHTML = `
                            <div class="tag">${selectedModel.icon} ${selectedModel.name}</div>
                            <div class="bubble" style="color:#f87171;">❌ ${escapeHtml(data.error || 'Gagal mendapatkan response')}</div>
                        `;
                        statusText.textContent = 'Error · Coba lagi';
                    }
                }
            } catch (e) {
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) {
                    loadingEl.innerHTML = `
                        <div class="bubble" style="color:#f87171;">❌ ${escapeHtml(e.message)}</div>
                    `;
                }
                statusText.textContent = 'Error · Koneksi gagal';
            }

            sendBtn.disabled = false;
            promptInput.focus();
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // === KEYBOARD SHORTCUT ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                modelDropdown.classList.remove('show');
                modelTrigger.classList.remove('open');
            }
        });

        // === INIT ===
        init();
    </script>
</body>
</html>
