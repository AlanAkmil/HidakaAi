<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyX AI · Multi AI Scraper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07060b;
            --surface: #131119;
            --surface-2: #1a1722;
            --border: #242031;
            --border-soft: rgba(255,255,255,0.07);
            --accent: #8b5cf6;
            --accent-bright: #b4a3ff;
            --accent-dim: #4c3680;
            --accent-glow: rgba(139,92,246,0.35);
            --text: #f3f1f8;
            --text-dim: #9a96ab;
            --text-faint: #5c5870;
            --success: #34d399;
            --danger: #f87171;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* ambient aurora signature */
        body::before {
            content: '';
            position: fixed;
            inset: -20%;
            z-index: -1;
            background:
                radial-gradient(38% 32% at 18% 12%, rgba(139,92,246,0.30), transparent 60%),
                radial-gradient(32% 30% at 85% 18%, rgba(80,60,200,0.22), transparent 60%),
                radial-gradient(40% 36% at 50% 95%, rgba(124,58,237,0.18), transparent 60%);
            filter: blur(60px);
            animation: aurora 22s var(--ease-soft) infinite alternate;
            pointer-events: none;
        }

        @keyframes aurora {
            0%   { transform: translate(0,0) scale(1); }
            50%  { transform: translate(2%, 3%) scale(1.08); }
            100% { transform: translate(-3%, -2%) scale(1.02); }
        }

        .container {
            width: 100%;
            max-width: 760px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: 95vh;
        }

        .header {
            text-align: center;
            padding: 6px 0 2px;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, var(--accent-bright), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-faint);
            letter-spacing: 2.5px;
        }

        /* MODEL SELECTOR */
        .model-selector-wrapper {
            position: relative;
        }

        .model-trigger {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            background: linear-gradient(135deg, rgba(139,92,246,0.07), rgba(255,255,255,0.015));
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            cursor: pointer;
            transition: border-color .45s var(--ease), box-shadow .45s var(--ease), transform .3s var(--ease);
            user-select: none;
        }

        .model-trigger:hover {
            border-color: rgba(139,92,246,0.4);
            box-shadow: 0 0 0 1px rgba(139,92,246,0.12), 0 8px 24px -12px rgba(139,92,246,0.35);
        }

        .model-trigger:focus-visible,
        .model-trigger.open {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .icon-badge {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            background: linear-gradient(135deg, rgba(139,92,246,0.28), rgba(139,92,246,0.06));
            border: 1px solid rgba(139,92,246,0.2);
            transition: transform .4s var(--ease);
        }

        .model-trigger:hover .icon-badge { transform: scale(1.06) rotate(-3deg); }

        .model-trigger .selected-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .model-trigger .selected-name {
            font-weight: 600;
            font-size: 0.92rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .model-trigger .selected-provider {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.66rem;
            color: var(--text-faint);
        }

        .model-trigger .chevron {
            color: var(--text-dim);
            transition: transform .45s var(--ease);
            font-size: 0.7rem;
        }

        .model-trigger.open .chevron { transform: rotate(180deg); }

        .model-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 8px;
            background: #15131c;
            border: 1px solid var(--border-soft);
            border-radius: 18px;
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 24px 60px -16px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.02);
            backdrop-filter: blur(20px);
        }

        .model-dropdown.show {
            display: block;
            animation: slideDown .4s var(--ease);
        }

        .dropdown-header {
            position: relative;
            display: flex;
            gap: 4px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-soft);
        }

        .tab-indicator {
            position: absolute;
            top: 8px;
            bottom: 8px;
            left: 12px;
            width: 0;
            border-radius: 20px;
            background: rgba(139,92,246,0.16);
            border: 1px solid rgba(139,92,246,0.35);
            transition: transform .45s var(--ease), width .45s var(--ease);
            z-index: 0;
        }

        .tab-btn {
            position: relative;
            z-index: 1;
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            transition: color .3s var(--ease-soft);
            white-space: nowrap;
        }

        .tab-btn.active { color: var(--accent-bright); }
        .tab-btn:hover:not(.active) { color: var(--text); }

        .search-box {
            width: calc(100% - 24px);
            padding: 11px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            margin: 10px 12px;
            transition: border-color .35s var(--ease), background .35s var(--ease);
        }

        .search-box::placeholder { color: var(--text-faint); }
        .search-box:focus { border-color: var(--accent); background: rgba(139,92,246,0.05); }

        .model-list-scroll {
            max-height: 300px;
            overflow-y: auto;
            padding: 4px 8px 10px;
        }

        .model-list-scroll::-webkit-scrollbar { width: 4px; }
        .model-list-scroll::-webkit-scrollbar-thumb {
            background: rgba(139,92,246,0.3);
            border-radius: 4px;
        }

        .model-option {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 9px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .25s var(--ease-soft), transform .25s var(--ease-soft);
            font-size: 0.85rem;
            animation: fadeUp .3s var(--ease) backwards;
        }

        .model-option:hover { background: rgba(139,92,246,0.08); transform: translateX(2px); }
        .model-option.selected { background: rgba(139,92,246,0.14); }

        .model-option .opt-icon-badge {
            width: 32px;
            height: 32px;
            min-width: 32px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            background: rgba(139,92,246,0.1);
            border: 1px solid var(--border-soft);
        }

        .model-option .opt-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .model-option .opt-name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .model-option .opt-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            color: var(--text-faint);
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .model-option .opt-tag {
            padding: 2px 6px;
            border-radius: 5px;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
        }

        .model-option .opt-check {
            color: var(--accent-bright);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity .25s var(--ease);
        }

        .model-option.selected .opt-check { opacity: 1; }

        .no-results {
            text-align: center;
            padding: 26px 12px;
            color: var(--text-faint);
            font-size: 0.8rem;
        }

        .chat-area {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border-soft);
            border-radius: 20px;
            padding: 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(139,92,246,0.3);
            border-radius: 4px;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeUp .5s var(--ease);
        }

        .msg.user { align-self: flex-end; }
        .msg.ai { align-self: flex-start; }

        .msg .bubble {
            padding: 11px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.55;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg.user .bubble {
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: #fff;
            border-bottom-right-radius: 5px;
        }

        .msg.ai .bubble {
            background: var(--surface-2);
            border: 1px solid var(--border-soft);
            border-bottom-left-radius: 5px;
        }

        .msg .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.63rem;
            color: var(--accent-bright);
            margin-bottom: 5px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            padding: 13px 16px;
            background: var(--surface);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            color: var(--text);
            font-size: 0.9rem;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: border-color .4s var(--ease), box-shadow .4s var(--ease);
            min-height: 50px;
            max-height: 100px;
        }

        textarea::placeholder { color: var(--text-faint); }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        .btn-send {
            width: 50px;
            min-width: 50px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent-bright), var(--accent));
            color: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .3s var(--ease), box-shadow .3s var(--ease), opacity .3s var(--ease);
        }

        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 10px 24px -8px var(--accent-glow); }
        .btn-send:active { transform: translateY(0); }
        .btn-send:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

        .loading-row {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
            font-size: 0.8rem;
            padding: 2px 0;
        }

        .dot-pulse {
            width: 6px; height: 6px;
            background: var(--accent-bright);
            border-radius: 50%;
            animation: wave 1.2s var(--ease-soft) infinite;
        }
        .dot-pulse:nth-child(2) { animation-delay: .15s; }
        .dot-pulse:nth-child(3) { animation-delay: .3s; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes wave { 0%, 60%, 100% { opacity: .25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes breathe { 0%, 100% { opacity: .5; transform: scale(.85); } 50% { opacity: 1; transform: scale(1.1); } }

        .empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-faint);
            font-size: 0.85rem;
            text-align: center;
        }

        .footer {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-faint);
            padding: 0 2px;
        }

        .footer .dot {
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: breathe 2.6s var(--ease-soft) infinite;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OxyX AI</h1>
            <span>53 MODEL · ANONYMOUS</span>
        </div>

        <!-- MODEL SELECTOR DROPDOWN -->
        <div class="model-selector-wrapper" id="modelSelectorWrapper">
            <div class="model-trigger" id="modelTrigger" tabindex="0" onclick="toggleDropdown()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleDropdown()}">
                <div class="icon-badge"><span id="selectedIcon">🧠</span></div>
                <div class="selected-info">
                    <span class="selected-name" id="selectedName">GPT-5.5</span>
                    <span class="selected-provider" id="selectedProvider">openai</span>
                </div>
                <span class="chevron">▼</span>
            </div>
            <div class="model-dropdown" id="modelDropdown">
                <div class="dropdown-header" id="dropdownHeader">
                    <div class="tab-indicator" id="tabIndicator"></div>
                    <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat', this)">💬 Chat</button>
                    <button class="tab-btn" data-tab="image" onclick="switchTab('image', this)">🖼️ Image</button>
                    <button class="tab-btn" data-tab="video" onclick="switchTab('video', this)">🎬 Video</button>
                </div>
                <input type="text" class="search-box" id="searchModel" placeholder="🔍 Cari model..." oninput="filterModels()">
                <div class="model-list-scroll" id="modelListScroll">
                    <div class="no-results">⏳ Memuat model...</div>
                </div>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty">✨ Tanyakan apapun ke 53 model AI...</div>
        </div>

        <div class="input-row">
            <textarea id="promptInput" placeholder="Ketik prompt..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendChat()" aria-label="Kirim">↑</button>
        </div>

        <div class="footer">
            <div class="dot"></div>
            <span id="statusText">Online · Siap digunakan</span>
        </div>
    </div>

        let selectedModel = ALL_MODELS[0];
        let currentTab = 'chat';
        let firstMsg = true;

        const chatArea = document.getElementById('chatArea');
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusText = document.getElementById('statusText');
        const searchInput = document.getElementById('searchModel');
        const modelListScroll = document.getElementById('modelListScroll');
        const modelDropdown = document.getElementById('modelDropdown');
        const modelTrigger = document.getElementById('modelTrigger');
        const tabIndicator = document.getElementById('tabIndicator');

        // === INIT ===
        function init() {
            renderModelList();
            updateSelectedDisplay();
            requestAnimationFrame(moveIndicatorToActive);
        }

        function updateSelectedDisplay() {
            document.getElementById('selectedIcon').textContent = selectedModel.icon;
            document.getElementById('selectedName').textContent = selectedModel.name;
            document.getElementById('selectedProvider').textContent = selectedModel.provider;
        }

        function toggleDropdown() {
            const isOpen = modelDropdown.classList.contains('show');
            if (isOpen) {
                modelDropdown.classList.remove('show');
                modelTrigger.classList.remove('open');
            } else {
                modelDropdown.classList.add('show');
                modelTrigger.classList.add('open');
                searchInput.value = '';
                filterModels();
                requestAnimationFrame(moveIndicatorToActive);
                searchInput.focus();
            }
        }

        function moveIndicatorToActive() {
            const activeBtn = document.querySelector('.tab-btn.active');
            if (!activeBtn) return;
            tabIndicator.style.transform = `translateX(${activeBtn.offsetLeft - 12}px)`;
            tabIndicator.style.width = activeBtn.offsetWidth + 'px';
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            moveIndicatorToActive();
            searchInput.value = '';
            filterModels();
        }

        function filterModels() {
            const query = searchInput.value.toLowerCase();
            const filtered = ALL_MODELS.filter(m => {
                const matchCat = m.category === currentTab;
                const matchSearch = !query ||
                    m.name.toLowerCase().includes(query) ||
                    m.provider.toLowerCase().includes(query) ||
                    m.id.toLowerCase().includes(query) ||
                    m.tags.some(t => t.includes(query));
                return matchCat && matchSearch;
            });

            if (filtered.length === 0) {
                modelListScroll.innerHTML = '<div class="no-results">😕 Tidak ada model ditemukan</div>';
            } else {
                modelListScroll.innerHTML = filtered.map((m, i) => `
                    <div class="model-option ${m.id === selectedModel.id ? 'selected' : ''}"
                         style="animation-delay:${Math.min(i * 0.02, 0.3)}s"
                         onclick="selectModel('${m.id}')">
                        <div class="opt-icon-badge">${m.icon}</div>
                        <div class="opt-info">
                            <span class="opt-name">${m.name}</span>
                            <span class="opt-meta">
                                <span>${m.provider}</span>
                                ${m.tags.map(t => `<span class="opt-tag">${t}</span>`).join('')}
                            </span>
                        </div>
                        <span class="opt-check">✓</span>
                    </div>
                `).join('');
            }
        }

        function selectModel(id) {
            const found = ALL_MODELS.find(m => m.id === id);
            if (found) {
                selectedModel = found;
                updateSelectedDisplay();
                modelDropdown.classList.remove('show');
                modelTrigger.classList.remove('open');
                renderModelList();
            }
        }

        function renderModelList() {
            filterModels();
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('modelSelectorWrapper');
            if (!wrapper.contains(e.target)) {
                modelDropdown.classList.remove('show');
                modelTrigger.classList.remove('open');
            }
        });

        window.addEventListener('resize', moveIndicatorToActive);

        // === CHAT ===
        async function sendChat() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            if (firstMsg) {
                chatArea.innerHTML = '';
                firstMsg = false;
            }

            // Add user message
            chatArea.insertAdjacentHTML('beforeend', `
                <div class="msg user">
                    <div class="bubble">${escapeHtml(prompt)}</div>
                </div>
            `);

            // Add loading
            const loadingId = 'loading-' + Date.now();
            chatArea.insertAdjacentHTML('beforeend', `
                <div class="msg ai" id="${loadingId}">
                    <div class="tag">${selectedModel.icon} ${selectedModel.name}</div>
                    <div class="bubble">
                        <div class="loading-row">
                            <div class="dot-pulse"></div>
                            <div class="dot-pulse"></div>
                            <div class="dot-pulse"></div>
                            <span style="margin-left:4px;">Berpikir...</span>
                        </div>
                    </div>
                </div>
            `);

            promptInput.value = '';
            sendBtn.disabled = true;
            statusText.textContent = 'Mengirim...';
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, model: selectedModel.id })
                });
                const data = await res.json();

                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) {
                    if (data.response) {
                        loadingEl.innerHTML = `
                            <div class="tag">${selectedModel.icon} ${selectedModel.name}</div>
                            <div class="bubble">${escapeHtml(data.response)}</div>
                        `;
                        statusText.textContent = 'Online · Siap digunakan';
                    } else {
                        loadingEl.innerHTML = `
                            <div class="tag">${selectedModel.icon} ${selectedModel.name}</div>
                            <div class="bubble" style="color:#f87171;">❌ ${escapeHtml(data.error || 'Gagal mendapatkan response')}</div>
                        `;
                        statusText.textContent = 'Error · Coba lagi';
                    }
                }
            } catch (e) {
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) {
                    loadingEl.innerHTML = `
                        <div class="bubble" style="color:#f87171;">❌ ${escapeHtml(e.message)}</div>
                    `;
                }
                statusText.textContent = 'Error · Koneksi gagal';
            }

            sendBtn.disabled = false;
            promptInput.focus();
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // === KEYBOARD SHORTCUT ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                modelDropdown.classList.remove('show');
                modelTrigger.classList.remove('open');
            }
        });

        // === INIT ===
        init();
    </script>
</body>
</html>
